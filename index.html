<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GROOVE — Music Player</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">
  <div class="player-panel">
    <div class="brand">GROOVE</div>

    <div class="vinyl-wrap">
      <div class="vinyl" id="vinyl">
        <div class="vinyl-label" id="vinylLabel"></div>
      </div>
      <div class="tonearm-base"></div>
      <div class="tonearm" id="tonearm"></div>
    </div>

    <div class="song-info">
      <div class="song-title" id="songTitle">Dusk Till Dawn</div>
      <div class="song-artist">by <span id="songArtist">ZAYN, Sia</span></div>
    </div>

    <div class="progress-wrap">
      <div class="loading-bar" id="loadingBar"></div>
      <div class="progress-track" id="progressTrack">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="time-labels">
        <span id="timeElapsed">0:00</span>
        <span id="timeDuration">0:00</span>
      </div>
    </div>

    <div class="controls">
      <button class="btn" id="btnPrev" title="Previous">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
        </svg>
      </button>
      <button class="btn-play" id="btnPlay">
        <svg id="iconPlay" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
          <path d="M8 5v14l11-7z"/>
        </svg>
        <svg id="iconPause" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style="display:none">
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
        </svg>
      </button>
      <button class="btn" id="btnNext" title="Next">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 18l8.5-6L6 6v12zm2.5-6 5.5 3.9V8.1L8.5 12zM16 6h2v12h-2z"/>
        </svg>
      </button>
    </div>

    <div class="volume-wrap">
      <svg class="volume-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
      </svg>
      <input class="volume-slider" type="range" id="volumeSlider" min="0" max="100" value="75" />
      <div class="volume-pct" id="volumePct">75%</div>
    </div>
  </div>
  <div class="playlist-panel">
    <div class="playlist-header">
      <div class="playlist-title">Now Playing</div>
      <div class="playlist-meta"><span id="trackCount">8</span> tracks · Late Night Sessions</div>
    </div>
    <div class="playlist-list" id="playlistList"></div>
    <div class="extras">
      <div class="tag" id="tagShuffle">Shuffle</div>
      <div class="tag on" id="tagRepeat">Repeat</div>
    </div>
  </div>
</div>

<audio id="audioEl" preload="none"></audio>

<script src="script.js"></script>
</body>
</html>
